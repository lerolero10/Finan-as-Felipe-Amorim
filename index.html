function antVal(m){var s=DB.receitas.find(function(r){return r.nome==='Saldo Anterior';});return s?(s.vals[m]||0):0;}
function sR(c,m){return DB.receitas.filter(function(r){return r.ciclo===c&&r.nome!=='Saldo Anterior';}).reduce(function(s,r){return s+(r.vals[m]||0);},0);}
function sD(c,m){return DB.despesas.filter(function(d){return d.ciclo===c;}).reduce(function(s,d){return s+(d.vals[m]||0);},0);}
function fatC(cid,m){if(!DB.faturas||!DB.faturas[cid])return 0;return(DB.faturas[cid][m]||[]).reduce(function(s,i){return s+i.val;},0);}
function fatCiclo(ciclo,m){return DB.cartoes.filter(function(c){return(c.vencimento||5)===ciclo;}).reduce(function(s,c){return s+fatC(c.id,m);},0);}
function recMes(m){return sR(5,m)+sR(20,m);}
function despMes(m){return sD(5,m)+fatCiclo(5,m)+sD(20,m)+fatCiclo(20,m);}
function balMes(m){return antVal(m)+recMes(m)-despMes(m);}
function autoSaldo(){
  var sr=DB.receitas.find(function(r){return r.nome==='Saldo Anterior';});if(!sr)return;var changed=false;
  for(var i=1;i<12;i++){
    var p=i-1,recReal=DB.receitas.filter(function(r){return r.nome!=='Saldo Anterior';}).reduce(function(s,r){return s+(r.vals[p]||0);},0);
    var despTotal=sD(5,p)+fatCiclo(5,p)+sD(20,p)+fatCiclo(20,p);
    var novo=parseFloat((sr.vals[p]+recReal-despTotal).toFixed(2));
    if(Math.abs((sr.vals[i]||0)-novo)>0.01){sr.vals[i]=novo;changed=true;}
  }
  if(changed)saveDB();
}

function saveFatItem(cid,mesIni){

function delItem(arr,id,mes){
  var list=arr==='d'?DB.despesas:DB.receitas;var item=list.find(function(x){return x.id===id;});if(!item)return;
  var m=(mes!==undefined&&mes!==null)?mes:M;
  var mesesComValor=item.vals.filter(function(v){return v!==0;}).length;
  if(mesesComValor<=1){if(!confirm('Excluir "'+item.nome+'"?'))return;if(arr==='d')DB.despesas=DB.despesas.filter(function(x){return x.id!==id;});else DB.receitas=DB.receitas.filter(function(x){return x.id!==id;});saveDB();closeSheet();render();toast('Removido');return;}
  var msg='Excluir "'+item.nome+'" em '+MS[m]+'?\n\nOK = Só '+MS3[m]+'\nCancelar = Série inteira';
  if(confirm(msg)){item.vals[m]=0;saveDB();closeSheet();render();toast(MS3[m]+' zerado');}
  else{if(!confirm('Excluir série inteira?'))return;if(arr==='d')DB.despesas=DB.despesas.filter(function(x){return x.id!==id;});else DB.receitas=DB.receitas.filter(function(x){return x.id!==id;});saveDB();closeSheet();render();toast('Série removida');}

  document.getElementById('overlay').classList.add('open');
}
function cdGrid(selId){return DB.cartoes.map(function(c){return '<div class="cd-opt'+(selId===c.id?' on':'')+'" id="cdo-'+c.id+'"><div class="cd-nm">💳 '+c.nome+'</div><div class="cd-lb">'+c.bandeira+'</div></div>';}).join('')||'<div style="font-size:11px;color:var(--gr2);padding:8px">Sem cartões</div>';}
function selCard(id){selCid=id;document.querySelectorAll('.cd-opt').forEach(function(el){el.classList.toggle('on',el.id==='cdo-'+id);});}
function attachCdGrid(){DB.cartoes.forEach(function(c){var el=document.getElementById('cdo-'+c.id);if(el)el.onclick=(function(cid){return function(){selCard(cid);};})(c.id);});}
function buildNew(isD,ciclo){
  var h='<div class="fld"><label>Nome</label><input type="text" id="fn" placeholder="'+(isD?'Ex: Academia...':'Ex: Freela...')+'"></div><div class="fld"><label>Tipo</label><div class="tg"><label class="to af" id="to-f"><input type="radio" name="tp" value="fixo" checked onchange="uTipo()"><div class="to-ic">📌</div><div class="to-lb">Fixo</div></label><label class="to" id="to-v"><input type="radio" name="tp" value="variavel" onchange="uTipo()"><div class="to-ic">📈</div><div class="to-lb">Variável</div></label><label class="to" id="to-e"><input type="radio" name="tp" value="eventual" onchange="uTipo()"><div class="to-ic">⚡</div><div class="to-lb">Eventual</div></label>'+(isD?'<label class="to" id="to-p"><input type="radio" name="tp" value="parcelado" onchange="uTipo()"><div class="to-ic">💳</div><div class="to-lb">Parcelado</div></label>':'')+'</div></div>';
  if(isD){h+='<div class="fld"><label>Ciclo</label><div class="cg"><div class="co'+(ciclo===5?' a5':'')+'" id="co5" onclick="sCiclo(5)"><div class="co-dy">5\u00ba</div><div class="co-lb">Dia Útil</div></div><div class="co'+(ciclo===20?' a20':'')+'" id="co20" onclick="sCiclo(20)"><div class="co-dy">20</div><div class="co-lb">Dia 20</div></div></div></div><div class="fld"><label>Pagamento</label><div class="pg"><label class="po op" id="pp-pix"><input type="radio" name="pay" value="pix" checked onchange="uPag()"><div class="po-ic">🟢</div><div class="po-lb">Pix</div></label><label class="po" id="pp-cc"><input type="radio" name="pay" value="cc" onchange="uPag()"><div class="po-ic">💳</div><div class="po-lb">Cartão</div></label><label class="po" id="pp-bol"><input type="radio" name="pay" value="boleto" onchange="uPag()"><div class="po-ic">📄</div><div class="po-lb">Boleto</div></label></div></div><div id="cc-blk" style="display:none"><div class="fld"><label>Cartão</label><div class="cd-grid">'+cdGrid(null)+'</div><button class="add-cd-btn" onclick="closeSheet();setTimeout(openAddCartao,200)">+ Novo cartão</button></div></div>';}
  h+='<div id="vb"><div class="fld"><label>Valor</label><input type="number" id="fv" step="0.01" inputmode="decimal" placeholder="0,00"></div><div class="fld"><label>Aplicar em</label><div class="chips"><div class="chip on" id="ac-mes" onclick="sApply(\'mes\')">Este mês</div><div class="chip" id="ac-todos" onclick="sApply(\'todos\')">Todos os meses</div><div class="chip" id="ac-partir" onclick="sApply(\'partir\')">Daqui em diante</div></div></div></div>'+(isD?'<div id="pb" style="display:none"><div class="fld"><label>Parcelamento</label><div class="pb-box"><div class="fr2"><div class="fld" style="margin:0"><label>Parcelas</label><input type="number" id="pn" min="2" max="120" value="12" inputmode="numeric"></div><div class="fld" style="margin:0"><label>Mês início</label><select id="pi">'+MS3.map(function(mm,i){return '<option value="'+i+'"'+(i===M?' selected':'')+'>'+mm+'</option>';}).join('')+'</select></div></div><div class="fld" style="margin-top:10px;margin-bottom:0"><label>Valor da parcela</label><input type="number" id="pv" step="0.01" inputmode="decimal" placeholder="0,00"></div></div></div></div>':'')+'<button class="btn-p" onclick="saveNew('+(isD?'true':'false')+')">Salvar</button><button class="btn-s" onclick="closeSheet()">Cancelar</button>';
  document.getElementById('sh-bd').innerHTML=h;attachCdGrid();
}
function uTipo(){var v=document.querySelector('input[name=tp]:checked');v=v?v.value:'fixo';var mp={fixo:['to-f','af'],variavel:['to-v','av'],eventual:['to-e','ae'],parcelado:['to-p','ap']};['f','v','e','p'].forEach(function(t){var el=document.getElementById('to-'+t);if(el)el.className='to';});if(mp[v]){var el=document.getElementById(mp[v][0]);if(el)el.classList.add(mp[v][1]);}var isP=v==='parcelado';var pb=document.getElementById('pb'),vb=document.getElementById('vb');if(pb)pb.style.display=isP?'block':'none';if(vb)vb.style.display=isP?'none':'block';}
function sCiclo(c){mCiclo=c;document.getElementById('co5').className='co'+(c===5?' a5':'');document.getElementById('co20').className='co'+(c===20?' a20':'');}
function uPag(){var v=document.querySelector('input[name=pay]:checked');v=v?v.value:'pix';selPag=v;var mp={pix:['pp-pix','op'],cc:['pp-cc','oc'],boleto:['pp-bol','ob']};['pix','cc','bol'].forEach(function(p){var el=document.getElementById('pp-'+p);if(el)el.className='po';});if(mp[v]){var el=document.getElementById(mp[v][0]);if(el)el.classList.add(mp[v][1]);}var blk=document.getElementById('cc-blk');if(blk)blk.style.display=v==='cc'?'block':'none';}
function sApply(mode){applyM=mode;['mes','todos','partir'].forEach(function(m){var el=document.getElementById('ac-'+m);if(el)el.classList.toggle('on',m===mode);});}
function saveNew(isD){
  var nome=document.getElementById('fn').value.trim();if(!nome)return;
  var tpEl=document.querySelector('input[name=tp]:checked'),tpRaw=tpEl?tpEl.value:'fixo';
  var isP=tpRaw==='parcelado',tipo=isP?'eventual':tpRaw;
  var payEl=document.querySelector('input[name=pay]:checked');var pay=payEl?payEl.value:'pix';
  var vals=new Array(12).fill(0);
  if(isP&&isD){var n=parseInt(document.getElementById('pn').value)||12;var ini=parseInt(document.getElementById('pi').value)||M;var pval=parseFloat(document.getElementById('pv').value)||0;for(var p=0;p<n&&(ini+p)<12;p++)vals[ini+p]=pval;DB.despesas.push({id:uid(),ciclo:mCiclo,nome:nome,tipo:tipo,vals:vals,parc:{total:n,parcela:1},pag:pay,cid:pay==='cc'?selCid:null});}
  else{var val=parseFloat((document.getElementById('fv')||{}).value)||0;if(applyM==='todos')vals.fill(val);else if(applyM==='partir'){for(var i=M;i<12;i++)vals[i]=val;}else vals[M]=val;if(isD)DB.despesas.push({id:uid(),ciclo:mCiclo,nome:nome,tipo:tipo,vals:vals,parc:null,pag:pay,cid:pay==='cc'?selCid:null});else DB.receitas.push({id:uid(),ciclo:mCiclo,nome:nome,tipo:tipo,vals:vals});}
  saveDB();closeSheet();render();toast('"'+nome+'" adicionado ✓');
}
function buildEdit(item,isD){
  var tp=item.tipo,pay=item.pag||'pix';var mc={fixo:['to-f','af'],variavel:['to-v','av'],eventual:['to-e','ae']};
  var h='<div class="fld"><label>Nome</label><input type="text" id="fn" value="'+item.nome.replace(/"/g,'&quot;')+'"></div><div class="fld"><label>Tipo</label><div class="tg">'+['fixo','variavel','eventual'].map(function(t){return '<label class="to'+(t===tp?' '+mc[t][1]:'')+'" id="to-'+t[0]+'"><input type="radio" name="tp" value="'+t+'"'+(t===tp?' checked':'')+' onchange="uTipoE()"><div class="to-ic">'+(t==='fixo'?'📌':t==='variavel'?'📈':'⚡')+'</div><div class="to-lb">'+t[0].toUpperCase()+t.slice(1)+'</div></label>';}).join('')+(isD?'<label class="to" id="to-p"><input type="radio" name="tp" value="parcelado" onchange="uTipoE()"><div class="to-ic">💳</div><div class="to-lb">Parcelado</div></label>':'')+'</div></div>';
  if(isD){h+='<div class="fld"><label>Ciclo</label><div class="cg"><div class="co'+(item.ciclo===5?' a5':'')+'" id="co5" onclick="sCiclo(5)"><div class="co-dy">5\u00ba</div><div class="co-lb">Dia Útil</div></div><div class="co'+(item.ciclo===20?' a20':'')+'" id="co20" onclick="sCiclo(20)"><div class="co-dy">20</div><div class="co-lb">Dia 20</div></div></div></div><div class="fld"><label>Pagamento</label><div class="pg"><label class="po'+(pay==='pix'?' op':'')+'" id="pp-pix"><input type="radio" name="pay" value="pix"'+(pay==='pix'?' checked':'')+' onchange="uPag()"><div class="po-ic">🟢</div><div class="po-lb">Pix</div></label><label class="po'+(pay==='cc'?' oc':'')+'" id="pp-cc"><input type="radio" name="pay" value="cc"'+(pay==='cc'?' checked':'')+' onchange="uPag()"><div class="po-ic">💳</div><div class="po-lb">Cartão</div></label><label class="po'+(pay==='boleto'?' ob':'')+'" id="pp-bol"><input type="radio" name="pay" value="boleto"'+(pay==='boleto'?' checked':'')+' onchange="uPag()"><div class="po-ic">📄</div><div class="po-lb">Boleto</div></label></div></div><div id="cc-blk" style="display:'+(pay==='cc'?'block':'none')+'"><div class="fld"><label>Cartão</label><div class="cd-grid">'+cdGrid(item.cid)+'</div></div></div>';}
  h+='<div class="fld"><label>Valores por mês</label><div class="mg">'+MS3.map(function(mm,i){return '<div class="mv"><div class="mv-lb">'+mm+'</div><input type="number" step="0.01" inputmode="decimal" id="mv'+i+'" value="'+(item.vals[i]||0)+'"></div>';}).join('')+'</div></div><button class="btn-p" id="btn-save-edit">Salvar</button><button class="btn-s" onclick="closeSheet()">Cancelar</button><button class="btn-d" id="btn-del-edit">Excluir</button>';
  document.getElementById('sh-bd').innerHTML=h;attachCdGrid();
  document.getElementById('btn-save-edit').onclick=function(){saveEdit(item.id,isD?'d':'r');};
  document.getElementById('btn-del-edit').onclick=function(){delItem(isD?'d':'r',item.id,M);};
}
function uTipoE(){var v=document.querySelector('input[name=tp]:checked');v=v?v.value:'fixo';var mp={fixo:['to-f','af'],variavel:['to-v','av'],eventual:['to-e','ae'],parcelado:['to-p','ap']};['f','v','e','p'].forEach(function(t){var el=document.getElementById('to-'+t);if(el)el.className='to';});if(mp[v]){var el=document.getElementById(mp[v][0]);if(el)el.classList.add(mp[v][1]);}}
function saveEdit(id,arr){var list=arr==='d'?DB.despesas:DB.receitas;var item=list.find(function(x){return x.id===id;});if(!item)return;item.nome=document.getElementById('fn').value.trim()||item.nome;var tpEl=document.querySelector('input[name=tp]:checked');if(tpEl&&tpEl.value!=='parcelado')item.tipo=tpEl.value;if(arr==='d'){item.ciclo=mCiclo;var payEl=document.querySelector('input[name=pay]:checked');item.pag=payEl?payEl.value:item.pag;item.cid=item.pag==='cc'?selCid:null;}for(var i=0;i<12;i++){var el=document.getElementById('mv'+i);if(el)item.vals[i]=parseFloat(el.value)||0;}saveDB();closeSheet();render();toast('"'+item.nome+'" atualizado ✓');}
function openDetalhe(tipo,m){
  var isRec=tipo==='rec';document.getElementById('sh-tl').textContent=(isRec?'Receitas':'Despesas')+' \u00b7 '+MS3[m]+'/'+CA;
  var items=isRec?DB.receitas.filter(function(r){return r.nome!=='Saldo Anterior'&&(r.vals[m]||0)!==0;}):DB.despesas.filter(function(d){return(d.vals[m]||0)!==0;});
  var total=items.reduce(function(s,i){return s+(i.vals[m]||0);},0);
  var bd=document.getElementById('sh-bd');
  bd.innerHTML='<div style="background:'+(isRec?'var(--gl)':'var(--rdl)')+';border-radius:10px;padding:12px 14px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center"><div style="font-size:11px;font-weight:800;color:'+(isRec?'var(--g1)':'var(--rd)')+'">TOTAL</div><div style="font-size:18px;font-weight:900;color:'+(isRec?'var(--g1)':'var(--rd)')+'">'+fmt(total,false)+'</div></div>'+items.map(function(item){return irRow(item,!isRec,m);}).join('')+'<div style="margin-top:12px"><button class="btn-p" id="btn-new-det">+ Novo</button><button class="btn-s" onclick="closeSheet()">Fechar</button></div>';
  document.getElementById('overlay').classList.add('open');
  attachIrEvents(items,!isRec,m);
  var bn=document.getElementById('btn-new-det');if(bn)bn.onclick=function(){closeSheet();openModal(isRec?'receita':'despesa',null,null);};
}
function closeSheet(){document.getElementById('overlay').classList.remove('open');}
function closeOut(e){if(e.target===document.getElementById('overlay'))closeSheet();}
var toastT;
function toast(msg){var el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(function(){el.classList.remove('show');},2200);}
window.addEventListener('load',function(){
  ensureBaseUsers();buildUserList();
  var meta=getMeta();
  if(meta.CU&&meta.CA){CU=meta.CU;CA=meta.CA;DB=loadDB(CU,CA);ensureMissingItems();document.getElementById('user-select').style.opacity='0';document.getElementById('user-select').style.pointerEvents='none';render();}
  setTimeout(function(){document.getElementById('splash').classList.add('fade');setTimeout(function(){var s=document.getElementById('splash');if(s)s.remove();},500);},1200);
});

// After rHome renders, attach dynamic events
var _origRender=render;
render=function(){
  _origRender();
  // Attach cicloCard add buttons
  [5,20].forEach(function(c){
    var ab=document.getElementById('add-'+c);if(ab)ab.onclick=function(){openModal('despesa',null,c);};
    // fatResumoHome add buttons
    DB.cartoes.forEach(function(ct){
      var fr=document.getElementById('fradd-'+ct.id);if(fr)fr.onclick=(function(cid){return function(){openAddFatura(cid,M);};})(ct.id);
      var frhdr=document.getElementById('frhdr-'+ct.id);if(frhdr)frhdr.onclick=function(){goPg('pg-cards',document.getElementById('n-cards'));};
    });
  });
};
