<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Finanças</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finanças">
<meta name="theme-color" content="#1a3a2a">

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --g1:#1a3a2a;--g2:#2d5a3d;--g3:#3a7a52;--g4:#52a875;--gl:#e8f5ee;--gll:#f4faf6;
  --gray:#6b7c75;--gray2:#9ab0a5;--gray3:#d4e2db;--gray4:#eef5f1;--gray5:#f7fbf9;
  --white:#fff;--dark:#0f2419;
  --red:#e05050;--redl:#fdf0f0;
  --orange:#d4820a;--orangel:#fef5e7;
  --blue:#2d6e9e;--bluel:#e8f4fc;
  --safe-top:env(safe-area-inset-top);--safe-bot:env(safe-area-inset-bottom);
}
html{font-size:15px;-webkit-font-smoothing:antialiased}
body{font-family:'Nunito',sans-serif;background:var(--gray4);color:var(--dark);min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden}
::-webkit-scrollbar{width:0;height:0}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:9999;background:linear-gradient(160deg,var(--g1),var(--g2),var(--g3));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .4s}
#splash.fade{opacity:0;pointer-events:none}
.sp-logo{width:88px;height:88px;border-radius:22px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:42px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.sp-t{font-size:26px;font-weight:900;color:#fff}
.sp-s{font-size:13px;font-weight:700;color:rgba(255,255,255,.6)}
.sp-dots{display:flex;gap:6px;margin-top:6px}
.sp-dots span{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.35);animation:dot .9s infinite}
.sp-dots span:nth-child(2){animation-delay:.15s}.sp-dots span:nth-child(3){animation-delay:.3s}
@keyframes dot{0%,80%,100%{transform:scale(.8);opacity:.35}40%{transform:scale(1.2);opacity:1}}

/* FULLSCREEN PANELS */
.fs-panel{position:fixed;inset:0;z-index:800;background:linear-gradient(160deg,var(--g1),var(--g2));display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;transition:opacity .3s;overflow-y:auto}
.fs-panel.hide{opacity:0;pointer-events:none}
.fs-logo-sm{font-size:32px;margin-bottom:8px}
.fs-title{font-size:22px;font-weight:900;color:#fff;margin-bottom:4px;text-align:center}
.fs-sub{font-size:13px;color:rgba(255,255,255,.6);font-weight:600;margin-bottom:20px;text-align:center}

/* USER CARDS */
.us-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%;max-width:340px;margin-bottom:20px}
.us-card{background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.18);border-radius:18px;padding:22px 14px;text-align:center;cursor:pointer;transition:all .2s}
.us-card:active{transform:scale(.97)}
.us-card.sel{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.6)}
.us-av{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:#fff;margin:0 auto 8px}
.us-name{font-size:15px;font-weight:800;color:#fff}
.us-role{font-size:11px;color:rgba(255,255,255,.55);font-weight:600;margin-top:2px}

/* YEAR CARDS */
.year-list{width:100%;max-width:340px;display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
.year-card{background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.15);border-radius:14px;padding:14px 18px;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:space-between}
.year-card:active{transform:scale(.98)}
.year-card.sel{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.6)}
.year-card-info{display:flex;align-items:center;gap:12px}
.year-icon{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.15);display:flex;align-items:center;justify-content:center;font-size:18px}
.year-name{font-size:15px;font-weight:800;color:#fff}
.year-sub{font-size:11px;color:rgba(255,255,255,.55);font-weight:600;margin-top:2px}
.year-del{background:rgba(255,77,77,.2);border:none;border-radius:8px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:#ffb3b3}

.new-year-box{width:100%;max-width:340px;background:rgba(255,255,255,.08);border:2px dashed rgba(255,255,255,.25);border-radius:14px;padding:16px;margin-bottom:20px}
.ny-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.ny-input{width:100%;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.2);color:#fff;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;padding:10px 12px;border-radius:10px;outline:none;-webkit-appearance:none}
.ny-input::placeholder{color:rgba(255,255,255,.4)}
.ny-input:focus{border-color:rgba(255,255,255,.5);background:rgba(255,255,255,.18)}
.ny-btn{width:100%;padding:12px;border-radius:10px;border:none;background:var(--g4);color:#fff;font-family:'Nunito',sans-serif;font-size:14px;font-weight:900;cursor:pointer}

.fs-btn{padding:14px 36px;border-radius:14px;border:none;background:var(--g4);color:#fff;font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.2);transition:all .15s;width:100%;max-width:340px}
.fs-btn:active{transform:scale(.98)}
.fs-btn-ghost{padding:12px 36px;border-radius:14px;border:2px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.7);font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;width:100%;max-width:340px;margin-top:8px}

/* HEADER */
.hdr{background:linear-gradient(160deg,var(--g1) 0%,var(--g2) 60%,var(--g3) 100%);padding:max(14px,var(--safe-top)) 18px 68px;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.04);top:-60px;right:-30px}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;position:relative;z-index:1}
.hdr-user{display:flex;align-items:center;gap:10px}
.avatar{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;color:#fff}
.hdr-name{font-size:14px;font-weight:800;color:#fff}
.hdr-sub{font-size:10px;color:rgba(255,255,255,.55);font-weight:600;margin-top:1px}
.hdr-right{display:flex;gap:6px;align-items:center}
.hdr-btn{background:rgba(255,255,255,.14);border:none;border-radius:16px;padding:5px 10px;font-family:'Nunito',sans-serif;font-size:10px;font-weight:800;color:rgba(255,255,255,.9);cursor:pointer;white-space:nowrap}
.month-nav{display:flex;align-items:center;gap:4px;background:rgba(255,255,255,.14);border-radius:16px;padding:5px 8px}
.month-nav span{font-size:11px;font-weight:800;color:#fff;min-width:38px;text-align:center}
.mnb{background:none;border:none;color:rgba(255,255,255,.8);font-size:16px;cursor:pointer;width:20px;height:20px;display:flex;align-items:center;justify-content:center;border-radius:50%}
.mnb:active{background:rgba(255,255,255,.2)}
.bal-section{position:relative;z-index:1}
.bal-lbl{font-size:10px;color:rgba(255,255,255,.55);font-weight:800;letter-spacing:.07em;text-transform:uppercase;margin-bottom:3px}
.bal-row{display:flex;align-items:center;gap:10px}
.bal-val{font-size:28px;font-weight:900;color:#fff;letter-spacing:-1px;line-height:1}
.eye-btn{background:rgba(255,255,255,.14);border:none;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px}
.bal-sub{font-size:11px;color:rgba(255,255,255,.5);margin-top:5px;font-weight:600}
.hdr-pills{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.pill{background:rgba(255,255,255,.1);border-radius:16px;padding:4px 9px;font-size:10px;font-weight:700;color:rgba(255,255,255,.8)}
.pill.g{background:rgba(82,168,117,.22);color:#a8f0c0}
.pill.r{background:rgba(224,80,80,.2);color:#ffc0c0}

/* QA */
.qa{display:flex;background:var(--white);border-radius:16px;box-shadow:0 6px 24px rgba(0,0,0,.1);margin:-38px 14px 0;position:relative;z-index:10;overflow:hidden}
.qab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:12px 4px;cursor:pointer;background:none;border:none;font-family:'Nunito',sans-serif;transition:background .15s;border-right:1px solid var(--gray4)}
.qab:last-child{border-right:none}
.qab:active{background:var(--gray5)}
.qa-ico{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px}
.qa-ico.g{background:var(--gl)}.qa-ico.gr{background:var(--gray4)}.qa-ico.o{background:var(--orangel)}.qa-ico.r{background:var(--redl)}
.qa-lbl{font-size:10px;font-weight:800;color:var(--gray)}

/* CONTENT */
.content{padding:14px 14px calc(80px + var(--safe-bot));display:flex;flex-direction:column;gap:12px}

/* SEC */
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px}
.st{font-size:14px;font-weight:900;color:var(--dark)}
.sa{font-size:12px;font-weight:800;color:var(--g3);cursor:pointer;background:none;border:none;font-family:'Nunito',sans-serif}

/* SUM */
.sum-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sum-card{background:var(--white);border-radius:14px;padding:13px 15px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
.sl{font-size:10px;font-weight:800;color:var(--gray2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.sv{font-size:17px;font-weight:900;letter-spacing:-.5px}
.sv.g{color:var(--g3)}.sv.r{color:var(--red)}.sv.d{color:var(--dark)}
.ss{font-size:10px;color:var(--gray2);margin-top:3px;font-weight:700}
.prog{height:3px;background:var(--gray4);border-radius:2px;margin-top:7px;overflow:hidden}
.pf{height:100%;border-radius:2px;transition:width .5s}

/* CARD WIDGET */
.cc{background:var(--white);border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.05);overflow:hidden}
.cc-head{padding:12px 15px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray4)}
.cc-info{display:flex;align-items:center;gap:9px}
.cc-dot{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px}
.cc-dot.g{background:var(--gl)}.cc-dot.gr{background:var(--gray4)}
.cc-name{font-size:13px;font-weight:900;color:var(--dark)}
.cc-date{font-size:10px;color:var(--gray2);font-weight:700;margin-top:1px}
.cc-bal{text-align:right}
.cc-bv{font-size:14px;font-weight:900}.cc-bv.g{color:var(--g3)}.cc-bv.r{color:var(--red)}
.cc-bl{font-size:10px;color:var(--gray2);font-weight:700}
.cc-prog{height:3px;background:var(--gray4)}
.cc-pf{height:100%;transition:width .5s}

/* ITEM ROW */
.ir{display:flex;align-items:center;justify-content:space-between;padding:10px 15px;border-bottom:1px solid var(--gray5);cursor:pointer;transition:background .12s;gap:8px}
.ir:last-child{border-bottom:none}
.ir:active{background:var(--gray5)}
.ir-l{display:flex;align-items:center;gap:9px;min-width:0;flex:1}
.ir-ico{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}
.ir-ico.g{background:var(--gl)}.ir-ico.gr{background:var(--gray4)}.ir-ico.r{background:var(--redl)}.ir-ico.o{background:var(--orangel)}.ir-ico.b{background:var(--bluel)}
.ir-txt{min-width:0}
.ir-name{font-size:13px;font-weight:800;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ir-meta{font-size:10px;color:var(--gray2);font-weight:600;margin-top:2px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.ir-r{text-align:right;flex-shrink:0}
.ir-val{font-size:13px;font-weight:900;color:var(--dark)}
.ir-val.z{color:var(--gray3)}
.tag{display:inline-block;font-size:9px;font-weight:800;padding:2px 5px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em}
.tf{background:var(--gl);color:var(--g2)}.tv{background:var(--gray4);color:var(--gray)}.te{background:var(--redl);color:var(--red)}.tp{background:var(--orangel);color:var(--orange)}
.pay-tag{display:inline-flex;align-items:center;gap:2px;font-size:9px;font-weight:700;padding:1px 5px;border-radius:4px;background:var(--bluel);color:var(--blue)}

/* ADD ROW */
.add-row{padding:10px 15px;border-top:1px solid var(--gray4);display:flex;align-items:center;gap:7px;cursor:pointer;transition:background .15s}
.add-row:active{background:var(--gray5)}
.add-ico{width:28px;height:28px;border-radius:50%;background:var(--gl);color:var(--g2);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.add-lbl{font-size:12px;font-weight:800;color:var(--g2)}

/* EMPTY */
.empty{padding:18px;text-align:center;color:var(--gray3);font-size:12px;font-weight:700}

/* CARTÃO FATURA */
.cartao-card{background:var(--white);border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.05);overflow:hidden;margin-bottom:10px}
.cartao-hdr{padding:14px 16px;background:linear-gradient(135deg,var(--g1),var(--g2));cursor:pointer}
.cartao-hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cartao-hdr-name{font-size:15px;font-weight:900;color:#fff}
.cartao-hdr-band{font-size:11px;color:rgba(255,255,255,.6);font-weight:700}
.cartao-fatura-val{font-size:22px;font-weight:900;color:#fff;letter-spacing:-.5px}
.cartao-fatura-lbl{font-size:10px;color:rgba(255,255,255,.6);font-weight:700;margin-bottom:2px}
.cartao-chips{display:flex;gap:6px;margin-top:8px}
.cartao-chip{background:rgba(255,255,255,.15);border-radius:10px;padding:4px 10px;font-size:10px;font-weight:800;color:rgba(255,255,255,.85)}
.cartao-chip.r{background:rgba(224,80,80,.25);color:#ffb3b3}
.fatura-body{padding:0}
.fatura-item{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--gray5);gap:8px}
.fatura-item:last-child{border-bottom:none}
.fi-l{display:flex;align-items:center;gap:9px;flex:1;min-width:0}
.fi-ico{width:32px;height:32px;border-radius:50%;background:var(--bluel);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.fi-name{font-size:12px;font-weight:800;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fi-meta{font-size:10px;color:var(--gray2);font-weight:600;margin-top:1px}
.fi-val{font-size:13px;font-weight:900;color:var(--dark)}
.fatura-total{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--gll);border-top:1px solid var(--gray3)}
.ft-lbl{font-size:12px;font-weight:800;color:var(--g2)}
.ft-val{font-size:16px;font-weight:900;color:var(--g1)}

/* ANUAL */
.anual-card{background:var(--white);border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.05);overflow:hidden}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:11px;min-width:680px}
thead th{background:var(--gray4);padding:8px 10px;text-align:right;font-weight:900;font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:.07em;border-bottom:2px solid var(--gray3);white-space:nowrap}
thead th:first-child{text-align:left;min-width:150px;padding-left:14px}
tbody tr{border-bottom:1px solid var(--gray4);transition:background .1s}
tbody tr:hover{background:var(--gray5)}
tbody td{padding:7px 10px;text-align:right;font-size:11px;font-weight:700;color:var(--gray);white-space:nowrap}
tbody td:first-child{text-align:left;font-weight:800;color:var(--dark);padding-left:14px}
.tr-tot td{background:var(--gl);color:var(--g1)!important;font-weight:900;border-top:2px solid var(--gray3)}
.tr-bal td{font-weight:900;border-top:1px solid var(--gray3)}
.tr-sep td{background:var(--gray4);font-size:10px;font-weight:900;color:var(--gray2);text-transform:uppercase;letter-spacing:.08em;padding:5px 14px}
.pv{color:var(--g3)!important}.rv{color:var(--red)!important}.zv{color:var(--gray3)!important}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--white);border-top:1px solid var(--gray3);display:flex;z-index:200;padding-bottom:var(--safe-bot);box-shadow:0 -4px 20px rgba(0,0,0,.06)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px 5px;cursor:pointer;background:none;border:none;font-family:'Nunito',sans-serif;transition:all .15s}
.ni-ico{font-size:19px;transition:transform .2s}
.ni-lbl{font-size:9px;font-weight:800;color:var(--gray2);transition:color .15s}
.ni.on .ni-lbl{color:var(--g2)}
.ni.on .ni-ico{transform:scale(1.12)}
.ni-dot{width:4px;height:4px;border-radius:50%;background:var(--g2);margin-top:-1px;opacity:0;transition:opacity .2s}
.ni.on .ni-dot{opacity:1}

/* SWIPE */
.swipe-wrap{touch-action:pan-y;user-select:none}

/* OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:500;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.overlay.open{opacity:1;pointer-events:all}
.sheet{background:var(--white);width:100%;max-width:430px;margin:0 auto;border-radius:22px 22px 0 0;max-height:94vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.22,1,.36,1);padding-bottom:var(--safe-bot)}
.overlay.open .sheet{transform:translateY(0)}
.sh-handle{width:36px;height:4px;background:var(--gray3);border-radius:2px;margin:12px auto 0}
.sh-head{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px}
.sh-title{font-size:17px;font-weight:900;color:var(--dark)}
.sh-close{background:var(--gray4);border:none;border-radius:50%;width:30px;height:30px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gray)}
.sh-body{padding:0 20px 16px}

/* FORM */
.field{margin-bottom:13px}
.field label{display:block;font-size:10px;font-weight:900;color:var(--gray2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}

.co{padding:11px 6px;border-radius:11px;border:2px solid var(--gray4);background:var(--gray5);cursor:pointer;text-align:center;transition:all .15s}

.co-lbl{font-size:10px;font-weight:800;color:var(--gray2)}
.co.a5{border-color:var(--g2);background:var(--gl)}.co.a5 .co-day,.co.a5 .co-lbl{color:var(--g1)}
.co.a20{border-color:var(--gray);background:var(--gray4)}.co.a20 .co-day,.co.a20 .co-lbl{color:var(--dark)}
.pay-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.pay-opt{padding:9px 4px;border-radius:10px;border:2px solid var(--gray4);background:var(--gray5);cursor:pointer;text-align:center;transition:all .15s}

.pay-opt.on-bol{border-color:var(--orange);background:var(--orangel)}.pay-opt.on-bol .pay-opt-lbl{color:var(--orange)}

function getMeta(){try{return JSON.parse(localStorage.getItem(META_KEY))||{}}catch{return{}}}
function saveMeta(m){localStorage.setItem(META_KEY,JSON.stringify(m))}
function dbKey(user,ano){return`fin_${user}_${ano}`}
function loadDB(user,ano){
  try{const d=localStorage.getItem(dbKey(user,ano));
    if(d)return JSON.parse(d);
    const nd=user==='raquel'?defRaquel(ano):defFelipe(ano);
    localStorage.setItem(dbKey(user,ano),JSON.stringify(nd));return nd;
  }catch{return user==='raquel'?defRaquel(ano):defFelipe(ano);}
}
function saveDB(){try{localStorage.setItem(dbKey(curUser,curAno),JSON.stringify(DB))}catch{}}
function listAnos(user){
  const anos=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith(`fin_${user}_`)){
      const a=k.replace(`fin_${user}_`,'');
      if(!isNaN(parseInt(a)))anos.push(parseInt(a));
    }
  }
  return anos.sort((a,b)=>b-a);
}

function buildYearPanel(){
  const nome=curUser==='raquel'?'Raquel':'Felipe';
  document.getElementById('py-title').textContent=`Planejamentos · ${nome}`;
  document.getElementById('py-sub').textContent='Selecione um ano ou crie novo';

  if(!anos.includes(2026)){loadDB(curUser,2026);anos.unshift(2026);}
  const list=document.getElementById('year-list');
  list.innerHTML=anos.map(a=>{
    const d=loadDB(curUser,a);
    const label=d.nomeAno?`${a} · ${d.nomeAno}`:String(a);
    return`<div class="year-card ${a===pendingAno?'sel':''}" onclick="selAno(${a})">

        <div><div class="year-name">${label}</div><div class="year-sub">${d.despesas?.length||0} despesas</div></div>

  if(!pendingAno&&anos.length>0)selAno(anos[0]);

function selAno(a){
  pendingAno=a;
  document.querySelectorAll('.year-card').forEach(c=>{
    c.classList.toggle('sel',c.onclick&&c.onclick.toString().includes(`selAno(${a})`));
  });
}

function criarAno(){
  const a=parseInt(document.getElementById('ny-ano').value);
  const n=document.getElementById('ny-nome').value.trim();
  if(!a||a<2020||a>2050){toast('Ano inválido');return;}
  const nd=curUser==='raquel'?defRaquel(a):defFelipe(a);
  if(n)nd.nomeAno=n;
  localStorage.setItem(dbKey(curUser,a),JSON.stringify(nd));
  document.getElementById('ny-ano').value='';
  document.getElementById('ny-nome').value='';
  buildYearPanel();
  selAno(a);
  toast(`Planejamento ${a} criado ✓`);
}

function delAno(a){
  if(!confirm(`Excluir planejamento ${a}?`))return;
  localStorage.removeItem(dbKey(curUser,a));
  if(pendingAno===a)pendingAno=null;
  buildYearPanel();
}

function confirmYear(){
  if(!pendingAno){toast('Selecione um ano');return;}
  curAno=pendingAno;
  DB=loadDB(curUser,curAno);
  if(!DB.faturas)DB.faturas={};
  saveMeta({curUser,curAno});
  showPanel(null);
  render();
}

// ═══ HELPERS ════════════════════════════════════════
function fmt(v,dash=true){
  if(dash&&v===0)return'—';
  const a=Math.abs(v),s=a.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  return(v<0?'-R$ ':'R$ ')+s;
}
function sR(c,m){return DB.receitas.filter(r=>r.ciclo===c).reduce((s,r)=>s+(r.vals[m]||0),0)}
function sD(c,m){return DB.despesas.filter(d=>d.ciclo===c).reduce((s,d)=>s+(d.vals[m]||0),0)}
function ant(m){const s=DB.receitas.find(r=>r.nome.includes('Saldo Anterior'));return s?(s.vals[m]||0):0}
function tR(m){return sR(5,m)+sR(20,m)-ant(m)}
function tD(m){return sD(5,m)+sD(20,m)+faturaTotal(null,m)}

// Fatura: soma todos os lançamentos de fatura do mês
function faturaTotal(cartaoId,m){
  if(!DB.faturas)return 0;
  if(cartaoId){
    const f=DB.faturas[cartaoId];
    if(!f)return 0;
    return(f[m]||[]).reduce((s,i)=>s+i.val,0);
  }
  // todos os cartões
  return DB.cartoes.reduce((s,c)=>{
    const f=DB.faturas[c.id];
    if(!f)return s;
    return s+(f[m]||[]).reduce((ss,i)=>ss+i.val,0);
  },0);
}

function cartaoNome(id){const c=DB.cartoes.find(x=>x.id===id);return c?c.nome:null}
function tagH(d){
  if(d.parc)return`<span class="tag tp">${d.parc.total}x</span>`;
  const mp={fixo:['tf','Fixo'],variavel:['tv','Variável'],eventual:['te','Eventual']};
  const[c,l]=mp[d.tipo]||mp.eventual;return`<span class="tag ${c}">${l}</span>`;
}
function payIco(p){return{pix:'🟢',cc:'💳',boleto:'📄'}[p]||'💸'}
function payLbl(p,cId){
  if(p==='cc'){const n=cartaoNome(cId);return n?`💳 ${n}`:'💳 Cartão';}
  return{pix:'🟢 Pix',boleto:'📄 Boleto'}[p]||'💸';
}

  const cards=DB.cartoes.map(c=>{
    const items=(DB.faturas[c.id]||{})[m]||[];
    const tot=items.reduce((s,i)=>s+i.val,0);
    const pct=c.limite>0?Math.min(tot/c.limite*100,100):0;
    return`<div class="cartao-card">
      <div class="cartao-hdr" onclick="toggleFatura('fat-${c.id}')">
        <div class="cartao-hdr-top">
          <div><div class="cartao-hdr-name">💳 ${c.nome}</div><div class="cartao-hdr-band">${c.bandeira} · Limite ${fmt(c.limite,false)}</div></div>
          <button onclick="event.stopPropagation();delCartao('${c.id}')" style="background:rgba(255,77,77,.2);border:none;border-radius:8px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;color:#ffb3b3">✕</button>
        </div>
        <div class="cartao-fatura-lbl">Fatura ${MS3[m]}/${curAno}</div>
        <div class="cartao-fatura-val">${fmt(tot,false)}</div>
        <div class="cartao-chips">
          <div class="cartao-chip">${items.length} lançamento(s)</div>
          <div class="cartao-chip ${pct>80?'r':''}">${pct.toFixed(0)}% do limite</div>
        </div>
        <div style="height:3px;background:rgba(255,255,255,.2);border-radius:2px;margin-top:10px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${pct<70?'rgba(168,240,192,.8)':pct<80?'rgba(255,220,100,.8)':'rgba(255,120,120,.8)'};border-radius:2px"></div>
        </div>
      </div>
      <div id="fat-${c.id}">
        <div class="fatura-body">
          ${items.length===0?'<div class="empty">Nenhum lançamento neste mês</div>':
            items.map(i=>`<div class="fatura-item">
              <div class="fi-l"><div class="fi-ico">${getIco(i.nome)}</div>
              <div><div class="fi-name">${i.nome}</div><div class="fi-meta">${i.parc?`${i.parc} parcela(s)`:''}</div></div></div>
              <div style="display:flex;align-items:center;gap:8px">
                <div class="fi-val">${fmt(i.val)}</div>
                <button onclick="delFaturaItem('${c.id}',${m},'${i.id}')" style="background:var(--redl);border:none;border-radius:6px;width:24px;height:24px;font-size:11px;cursor:pointer;color:var(--red);display:flex;align-items:center;justify-content:center">✕</button>
              </div>
            </div>`).join('')}
        </div>
        ${tot>0?`<div class="fatura-total"><div class="ft-lbl">Total da fatura</div><div class="ft-val">${fmt(tot,false)}</div></div>`:''}
        <div class="add-row" onclick="openAddFatura('${c.id}',${m})"><div class="add-ico">+</div><div class="add-lbl">Lançar na fatura</div></div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('cards-c').innerHTML=`
    <div style="margin-bottom:14px;display:flex;align-items:center;justify-content:space-between">
      <div>
        <div style="font-size:18px;font-weight:900;color:var(--dark)">Cartões</div>
        <div style="font-size:11px;color:var(--gray2);font-weight:600">${MS[m]} · ${curAno}</div>
      </div>
      <div class="month-nav"><button class="mnb" onclick="chM(-1);goPg('pg-cards',document.getElementById('n-cards'))">‹</button><span>${MS3[m]}</span><button class="mnb" onclick="chM(1);goPg('pg-cards',document.getElementById('n-cards'))">›</button></div>
    </div>
    ${cards||'<div class="empty" style="padding:40px">Nenhum cartão cadastrado</div>'}
    <button class="btn-p" onclick="openAddCartao()">+ Novo Cartão</button>`;
}

function toggleFatura(id){
  const el=document.getElementById(id);
  if(el)el.style.display=el.style.display==='none'?'block':'none';
}

function openAddFatura(cartaoId,mes){
  document.getElementById('sh-title').textContent='Lançar na Fatura';
  const c=DB.cartoes.find(x=>x.id===cartaoId);
  document.getElementById('sh-body').innerHTML=`
    <div style="background:var(--bluel);border-radius:10px;padding:10px 12px;margin-bottom:14px;font-size:12px;font-weight:800;color:var(--blue)">
      💳 ${c?.nome||'Cartão'} · ${MS3[mes]}/${curAno}
    </div>
    <div class="field"><label>Descrição</label><input type="text" id="fn" placeholder="Ex: Supermercado, Roupa..."></div>
    <div class="field"><label>Valor (R$)</label><input type="number" id="fv" step="0.01" inputmode="decimal" placeholder="0,00"></div>
    <div class="field">
      <label>É parcelado?</label>
      <div class="fr2">
        <div class="field" style="margin:0"><label>Nº parcelas</label><input type="number" id="pn" min="1" max="120" value="1" inputmode="numeric"></div>
        <div class="field" style="margin:0"><label>Mês início</label><select id="pi">${MS3.map((mm,i)=>`<option value="${i}" ${i===mes?'selected':''}>${mm}</option>`).join('')}</select></div>
      </div>
      <div class="hint" style="font-size:10px;color:var(--gray2);margin-top:5px;font-weight:700">Se parcelado em +1x, lança em meses seguintes automaticamente</div>
    </div>
    <button class="btn-p" onclick="saveFaturaItem('${cartaoId}',${mes})">Lançar</button>
    <button class="btn-s" onclick="closeSheet()">Cancelar</button>`;
  document.getElementById('overlay').classList.add('open');
}

function saveFaturaItem(cartaoId,mesInicio){
  const nome=document.getElementById('fn')?.value.trim();
  if(!nome)return;
  const val=parseFloat(document.getElementById('fv')?.value)||0;
  if(val<=0){toast('Informe um valor');return;}
  const n=parseInt(document.getElementById('pn')?.value)||1;
  const ini=parseInt(document.getElementById('pi')?.value)||mesInicio;
  if(!DB.faturas)DB.faturas={};
  if(!DB.faturas[cartaoId])DB.faturas[cartaoId]={};
  // lança em cada mês das parcelas
  for(let p=0;p<n;p++){
    const mes=(ini+p);
    if(mes>11)break;
    if(!DB.faturas[cartaoId][mes])DB.faturas[cartaoId][mes]=[];
    DB.faturas[cartaoId][mes].push({id:uid(),nome,val,parc:n>1?`${p+1}/${n}`:null});
  }
  saveDB();closeSheet();render();toast(`"${nome}" lançado na fatura ✓`);
}

function delFaturaItem(cartaoId,mes,itemId){
  if(!confirm('Remover este lançamento?'))return;
  if(DB.faturas&&DB.faturas[cartaoId]&&DB.faturas[cartaoId][mes])
    DB.faturas[cartaoId][mes]=DB.faturas[cartaoId][mes].filter(i=>i.id!==itemId);
  saveDB();render();toast('Lançamento removido');
}

function openAddCartao(){
  document.getElementById('sh-title').textContent='Novo Cartão';
  document.getElementById('sh-body').innerHTML=`
    <div class="field"><label>Nome do cartão</label><input type="text" id="cn" placeholder="Ex: Nubank, Itaú..."></div>
    <div class="field"><label>Bandeira</label>
      <select id="cb"><option>Mastercard</option><option>Visa</option><option>Elo</option><option>American Express</option></select></div>
    <div class="field"><label>Limite (R$)</label><input type="number" id="cl" step="100" inputmode="decimal" placeholder="5000"></div>
    <button class="btn-p" onclick="saveCartao()">Salvar Cartão</button>
    <button class="btn-s" onclick="closeSheet()">Cancelar</button>`;
  document.getElementById('overlay').classList.add('open');
}

function saveCartao(){
  const nome=document.getElementById('cn')?.value.trim();if(!nome)return;
  const bandeira=document.getElementById('cb')?.value||'Mastercard';
  const limite=parseFloat(document.getElementById('cl')?.value)||0;
  if(!DB.faturas)DB.faturas={};
  DB.cartoes.push({id:uid(),nome,bandeira,limite});
  saveDB();closeSheet();render();toast(`Cartão "${nome}" adicionado ✓`);
}

function delCartao(id){
  if(!confirm('Excluir este cartão e todos os lançamentos?'))return;
  DB.cartoes=DB.cartoes.filter(c=>c.id!==id);
  if(DB.faturas)delete DB.faturas[id];
  saveDB();render();toast('Cartão removido');
}

// ═══ MODAL DESPESA/RECEITA ════════════════════════════
function openModal(type,id=null,defCiclo=null){
  editId=id;editArr=type;mCiclo=defCiclo||5;applyM='mes';selPayment='pix';selCartaoId=null;
  document.getElementById('sh-title').textContent=id?(type==='despesa'?'Editar Despesa':'Editar Receita'):(type==='despesa'?'Nova Despesa':'Nova Receita');
  if(id){
    const arr=type==='despesa'?DB.despesas:DB.receitas;
    const item=arr.find(x=>x.id===id);
    if(item){mCiclo=item.ciclo;selPayment=item.pagamento||'pix';selCartaoId=item.cartaoId||null;buildEdit(item,type==='despesa');}
  }else buildNew(type==='despesa',defCiclo||5);
  document.getElementById('overlay').classList.add('open');
}

function buildNew(isD,ciclo){
  document.getElementById('sh-body').innerHTML=`
    <div class="field"><label>Nome</label><input type="text" id="fn" placeholder="${isD?'Ex: Academia, Mercado...':'Ex: Freela, Bônus...'}"></div>
    <div class="field"><label>Tipo</label><div class="tg">
      <label class="to af" id="to-f"><input type="radio" name="tp" value="fixo" checked onchange="uTipo()"><div class="to-ico">📌</div><div class="to-lbl">Fixo</div></label>
      <label class="to" id="to-v"><input type="radio" name="tp" value="variavel" onchange="uTipo()"><div class="to-ico">📈</div><div class="to-lbl">Variável</div></label>
      <label class="to" id="to-e"><input type="radio" name="tp" value="eventual" onchange="uTipo()"><div class="to-ico">⚡</div><div class="to-lbl">Eventual</div></label>
      ${isD?`<label class="to" id="to-p"><input type="radio" name="tp" value="parcelado" onchange="uTipo()"><div class="to-ico">💳</div><div class="to-lbl">Parcelado</div></label>`:''}
    </div></div>
    ${isD?`<div class="field"><label>Ciclo</label><div class="cg">
      <div class="co ${ciclo===5?'a5':''}" id="co5" onclick="sCiclo(5)"><div class="co-day">5º</div><div class="co-lbl">Dia Útil</div></div>
      <div class="co ${ciclo===20?'a20':''}" id="co20" onclick="sCiclo(20)"><div class="co-day">20</div><div class="co-lbl">Todo mês</div></div>
    </div></div>
    <div class="field"><label>Forma de pagamento</label><div class="pay-grid">
      <label class="pay-opt on-pix" id="pp-pix"><input type="radio" name="pay" value="pix" checked onchange="uPay()"><div class="pay-opt-ico">🟢</div><div class="pay-opt-lbl">Pix</div></label>
      <label class="pay-opt" id="pp-cc"><input type="radio" name="pay" value="cc" onchange="uPay()"><div class="pay-opt-ico">💳</div><div class="pay-opt-lbl">Cartão</div></label>
      <label class="pay-opt" id="pp-bol"><input type="radio" name="pay" value="boleto" onchange="uPay()"><div class="pay-opt-ico">📄</div><div class="pay-opt-lbl">Boleto</div></label>
    </div></div>
    <div id="cc-block" style="display:none"><div class="field"><label>Cartão</label>
      <div class="card-grid">${buildCardGrid()}</div>
      <button class="add-card-btn" onclick="closeSheet();setTimeout(()=>openAddCartao(),200)">+ Cadastrar novo cartão</button>
    </div></div>`:''}
    <div id="vb">
      <div class="field"><label>Valor (${MS3[M]}/${curAno})</label><input type="number" id="fv" step="0.01" inputmode="decimal" placeholder="0,00"></div>
      <div class="field"><label>Aplicar em</label><div class="chips">
        <div class="chip on" id="ac-mes" onclick="sApply('mes')">Este mês</div>
        <div class="chip" id="ac-todos" onclick="sApply('todos')">Todos os meses</div>
        <div class="chip" id="ac-partir" onclick="sApply('partir')">Daqui em diante</div>
      </div></div>
    </div>
    <div id="pb" style="display:none"><div class="field"><label>Parcelamento</label>
      <div class="parc-box"><div class="fr2">
        <div class="field" style="margin:0"><label>Nº parcelas</label><input type="number" id="pn" min="2" max="120" value="12" inputmode="numeric"></div>
        <div class="field" style="margin:0"><label>Mês início</label><select id="pi">${MS3.map((mm,i)=>`<option value="${i}" ${i===M?'selected':''}>${mm}</option>`).join('')}</select></div>
      </div>
      <div class="field" style="margin-top:10px;margin-bottom:0"><label>Valor da parcela</label><input type="number" id="pv" step="0.01" inputmode="decimal" placeholder="0,00"></div>
      </div></div>
    </div>
    <button class="btn-p" onclick="saveNew(${isD})">Salvar</button>
    <button class="btn-s" onclick="closeSheet()">Cancelar</button>`;
}

function buildCardGrid(selId=null){
  const s=selId||selCartaoId;
  return DB.cartoes.map(c=>`
    <div class="card-opt ${s===c.id?'on':''}" onclick="selCard('${c.id}')">
      <div class="card-opt-name">💳 ${c.nome}</div>
      <div class="card-opt-lim">${c.bandeira}</div>
    </div>`).join('')||'<div style="font-size:11px;color:var(--gray2);padding:8px">Nenhum cartão cadastrado</div>';
}

function selCard(id){
  selCartaoId=id;
  document.querySelectorAll('.card-opt').forEach(el=>{
    el.classList.toggle('on',el.getAttribute('onclick')===`selCard('${id}')`);
  });
}

function uPay(){
  const v=document.querySelector('input[name=pay]:checked')?.value;
  selPayment=v||'pix';
  ['pix','cc','bol'].forEach(p=>{const el=document.getElementById(`pp-${p}`);if(el)el.className='pay-opt';});
  const mp={pix:['pp-pix','on-pix'],cc:['pp-cc','on-cc'],boleto:['pp-bol','on-bol']};
  if(mp[v]){const[id,cls]=mp[v];document.getElementById(id)?.classList.add(cls);}
  const ccBlock=document.getElementById('cc-block');
  if(ccBlock)ccBlock.style.display=v==='cc'?'block':'none';
}

function uTipo(){
  const v=document.querySelector('input[name=tp]:checked')?.value;
  ['f','v','e','p'].forEach(t=>{const el=document.getElementById(`to-${t}`);if(el)el.className='to';});
  const mp={fixo:['to-f','af'],variavel:['to-v','av'],eventual:['to-e','ae'],parcelado:['to-p','ap']};
  if(mp[v]){const[id,cls]=mp[v];document.getElementById(id)?.classList.add(cls);}
  const isP=v==='parcelado';
  document.getElementById('pb').style.display=isP?'block':'none';
  document.getElementById('vb').style.display=isP?'none':'block';
}

function sCiclo(c){
  mCiclo=c;
  document.getElementById('co5').className='co'+(c===5?' a5':'');
  document.getElementById('co20').className='co'+(c===20?' a20':'');
}

function sApply(mode){
  applyM=mode;
  ['mes','todos','partir'].forEach(m=>document.getElementById(`ac-${m}`)?.classList.toggle('on',m===mode));
}

function saveNew(isD){
  const nome=document.getElementById('fn')?.value.trim();if(!nome){document.getElementById('fn')?.focus();return;}
  const tpRaw=document.querySelector('input[name=tp]:checked')?.value||'fixo';
  const isP=tpRaw==='parcelado';
  const tipo=isP?'eventual':tpRaw;
  const pay=document.querySelector('input[name=pay]:checked')?.value||'pix';
  const vals=new Array(12).fill(0);
  if(isP&&isD){
    const n=parseInt(document.getElementById('pn')?.value)||12;
    const ini=parseInt(document.getElementById('pi')?.value)||M;
    const pval=parseFloat(document.getElementById('pv')?.value)||0;
    for(let p=0;p<n&&(ini+p)<12;p++)vals[ini+p]=pval;
    // se pago no cartão, lança na fatura também
    if(pay==='cc'&&selCartaoId){
      if(!DB.faturas)DB.faturas={};
      if(!DB.faturas[selCartaoId])DB.faturas[selCartaoId]={};
      for(let p=0;p<n&&(ini+p)<12;p++){
        const mes=ini+p;
        if(!DB.faturas[selCartaoId][mes])DB.faturas[selCartaoId][mes]=[];
        DB.faturas[selCartaoId][mes].push({id:uid(),nome,val:pval,parc:`${p+1}/${n}`});
      }
    }
    DB.despesas.push({id:uid(),ciclo:mCiclo,nome,tipo,vals,parc:{total:n,parcela:1},pagamento:pay,cartaoId:pay==='cc'?selCartaoId:null});
  }else{
    const val=parseFloat(document.getElementById('fv')?.value)||0;
    if(applyM==='todos')vals.fill(val);
    else if(applyM==='partir'){for(let i=M;i<12;i++)vals[i]=val;}
    else vals[M]=val;
    if(isD)DB.despesas.push({id:uid(),ciclo:mCiclo,nome,tipo,vals,parc:null,pagamento:pay,cartaoId:pay==='cc'?selCartaoId:null});
    else DB.receitas.push({id:uid(),ciclo:mCiclo,nome,tipo,vals});
  }
  saveDB();closeSheet();render();toast(`"${nome}" adicionado ✓`);
}

function buildEdit(item,isD){
  const tp=item.tipo,pay=item.pagamento||'pix';
  const mc={fixo:['to-f','af'],variavel:['to-v','av'],eventual:['to-e','ae']};
  document.getElementById('sh-body').innerHTML=`
    <div class="field"><label>Nome</label><input type="text" id="fn" value="${item.nome}"></div>
    <div class="field"><label>Tipo</label><div class="tg">
      ${['fixo','variavel','eventual'].map(t=>`
      <label class="to ${t===tp?mc[t][1]:''}" id="to-${t[0]}">
        <input type="radio" name="tp" value="${t}" ${t===tp?'checked':''} onchange="uTipoE()">
        <div class="to-ico">${t==='fixo'?'📌':t==='variavel'?'📈':'⚡'}</div>
        <div class="to-lbl">${t[0].toUpperCase()+t.slice(1)}</div>
      </label>`).join('')}
      ${isD?`<label class="to" id="to-p"><input type="radio" name="tp" value="parcelado" onchange="uTipoE()"><div class="to-ico">💳</div><div class="to-lbl">Parcelado</div></label>`:''}
    </div></div>
    ${isD?`<div class="field"><label>Ciclo</label><div class="cg">
      <div class="co ${item.ciclo===5?'a5':''}" id="co5" onclick="sCiclo(5)"><div class="co-day">5º</div><div class="co-lbl">Dia Útil</div></div>
      <div class="co ${item.ciclo===20?'a20':''}" id="co20" onclick="sCiclo(20)"><div class="co-day">20</div><div class="co-lbl">Todo mês</div></div>
    </div></div>
    <div class="field"><label>Forma de pagamento</label><div class="pay-grid">
      <label class="pay-opt ${pay==='pix'?'on-pix':''}" id="pp-pix"><input type="radio" name="pay" value="pix" ${pay==='pix'?'checked':''} onchange="uPay()"><div class="pay-opt-ico">🟢</div><div class="pay-opt-lbl">Pix</div></label>
      <label class="pay-opt ${pay==='cc'?'on-cc':''}" id="pp-cc"><input type="radio" name="pay" value="cc" ${pay==='cc'?'checked':''} onchange="uPay()"><div class="pay-opt-ico">💳</div><div class="pay-opt-lbl">Cartão</div></label>
      <label class="pay-opt ${pay==='boleto'?'on-bol':''}" id="pp-bol"><input type="radio" name="pay" value="boleto" ${pay==='boleto'?'checked':''} onchange="uPay()"><div class="pay-opt-ico">📄</div><div class="pay-opt-lbl">Boleto</div></label>
    </div></div>
    <div id="cc-block" style="display:${pay==='cc'?'block':'none'}"><div class="field"><label>Cartão</label>
      <div class="card-grid">${buildCardGrid(item.cartaoId)}</div>
    </div></div>`:''}
    <div class="field"><label>Valores por mês</label><div class="mg">
      ${MS3.map((mm,i)=>`<div class="mv"><div class="mv-lbl">${mm}</div><input type="number" step="0.01" inputmode="decimal" id="mv${i}" value="${item.vals[i]||0}"></div>`).join('')}
    </div></div>
    <button class="btn-p" onclick="saveEdit('${item.id}','${isD?'d':'r'}')">Salvar alterações</button>
    <button class="btn-s" onclick="closeSheet()">Cancelar</button>
    <button class="btn-d" onclick="delItem('${isD?'d':'r'}','${item.id}')">Excluir este item</button>`;
}

function uTipoE(){
  const v=document.querySelector('input[name=tp]:checked')?.value;
  ['f','v','e','p'].forEach(t=>{const el=document.getElementById(`to-${t}`);if(el)el.className='to';});
  const mp={fixo:['to-f','af'],variavel:['to-v','av'],eventual:['to-e','ae'],parcelado:['to-p','ap']};
  if(mp[v]){const[id,cls]=mp[v];document.getElementById(id)?.classList.add(cls);}
}

function saveEdit(id,arr){
  const list=arr==='d'?DB.despesas:DB.receitas;
  const item=list.find(x=>x.id===id);if(!item)return;
  item.nome=document.getElementById('fn')?.value.trim()||item.nome;
  const tpEl=document.querySelector('input[name=tp]:checked');
  if(tpEl&&tpEl.value!=='parcelado')item.tipo=tpEl.value;
  if(arr==='d'){
    item.ciclo=mCiclo;
    item.pagamento=document.querySelector('input[name=pay]:checked')?.value||item.pagamento;
    item.cartaoId=item.pagamento==='cc'?selCartaoId:null;
  }
  for(let i=0;i<12;i++){const el=document.getElementById(`mv${i}`);if(el)item.vals[i]=parseFloat(el.value)||0;}
  saveDB();closeSheet();render();toast(`"${item.nome}" atualizado ✓`);
}

function delItem(arr,id){
  const list=arr==='d'?DB.despesas:DB.receitas;
  const item=list.find(x=>x.id===id);
  if(!item||!confirm(`Excluir "${item.nome}"?`))return;
  if(arr==='d')DB.despesas=DB.despesas.filter(x=>x.id!==id);
  else DB.receitas=DB.receitas.filter(x=>x.id!==id);
  saveDB();closeSheet();render();toast('Item removido');
}

function closeSheet(){document.getElementById('overlay').classList.remove('open');editId=null;}
function closeOut(e){if(e.target===document.getElementById('overlay'))closeSheet();}

let tT;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(tT);tT=setTimeout(()=>el.classList.remove('show'),2200);}

// INIT
window.addEventListener('load',()=>{
  const meta=getMeta();
  if(meta.curUser&&meta.curAno){
    curUser=meta.curUser;curAno=meta.curAno;
    DB=loadDB(curUser,curAno);
    if(!DB.faturas)DB.faturas={};
    showPanel(null);render();
  }else{
    showPanel('panel-user');
  }
  setTimeout(()=>{document.getElementById('splash').classList.add('fade');setTimeout(()=>document.getElementById('splash').remove(),500);},1200);
});
</script>
</body>
</html>
