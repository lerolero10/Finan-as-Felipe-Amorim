<!-- Manifest inline -->
<script>
(function(){
  // Gera ícone em canvas
  const c=document.createElement('canvas');
  c.width=512;c.height=512;
  const ctx=c.getContext('2d');
  // Fundo roxo arredondado
  const r=90;
  ctx.beginPath();
  ctx.moveTo(r,0);ctx.lineTo(512-r,0);
  ctx.quadraticCurveTo(512,0,512,r);
  ctx.lineTo(512,512-r);
  ctx.quadraticCurveTo(512,512,512-r,512);
  ctx.lineTo(r,512);
  ctx.quadraticCurveTo(0,512,0,512-r);
  ctx.lineTo(0,r);
  ctx.quadraticCurveTo(0,0,r,0);
  ctx.closePath();
  const grad=ctx.createLinearGradient(0,0,512,512);
  grad.addColorStop(0,'#6a0dab');
  grad.addColorStop(1,'#a020f0');
  ctx.fillStyle=grad;
  ctx.fill();
  // Letra F
  ctx.fillStyle='#fff';
  ctx.font='bold 300px Nunito,Arial,sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('₿',262,275);
  // Linha decorativa
  ctx.strokeStyle='rgba(255,255,255,0.3)';
  ctx.lineWidth=8;
  ctx.beginPath();ctx.moveTo(60,340);ctx.lineTo(452,340);ctx.stroke();
  const url=c.toDataURL('image/png');
  document.getElementById('pwa-icon-link').href=url;
  document.getElementById('favicon-link').href=url;

  // Manifest blob
  const manifest={
    name:'Felipe · Finanças',
    short_name:'Finanças',
    description:'Controle financeiro pessoal',
    start_url:'.',
    display:'standalone',
    orientation:'portrait',
    background_color:'#820ad1',
    theme_color:'#820ad1',
    icons:[{src:url,sizes:'512x512',type:'image/png',purpose:'any maskable'}]
  };
  const blob=new Blob([JSON.stringify(manifest)],{type:'application/manifest+json'});
  const mlink=document.createElement('link');
  mlink.rel='manifest';
  mlink.href=URL.createObjectURL(blob);
  document.head.appendChild(mlink);
})();
</script>

<!-- Splash screens iPhone (cores via meta) -->
<style>
/* Splash nativo */
body.splash-active{overflow:hidden}
#splash{
  position:fixed;inset:0;z-index:9999;
  background:linear-gradient(160deg,#6a0dab 0%,#820ad1 60%,#a020f0 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;transition:opacity .4s ease;
}
#splash.fade{opacity:0;pointer-events:none}
#splash-logo{
  width:96px;height:96px;border-radius:24px;
  background:rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  font-size:48px;
  box-shadow:0 8px 32px rgba(0,0,0,.3);
}
#splash-title{font-family:'Nunito',sans-serif;font-size:28px;font-weight:900;color:#fff;letter-spacing:-.5px}
#splash-sub{font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;color:rgba(255,255,255,.6)}
#splash-dots{display:flex;gap:6px;margin-top:8px}
#splash-dots span{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,.35);
  animation:dot .9s infinite;
}
#splash-dots span:nth-child(2){animation-delay:.15s}
#splash-dots span:nth-child(3){animation-delay:.3s}
@keyframes dot{0%,80%,100%{transform:scale(.8);opacity:.35}40%{transform:scale(1.2);opacity:1}}
</style>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --purple:#820ad1;--purple-l:#9b30e8;--purple-d:#5c0899;--purple-bg:#f5eeff;
  --green:#00c16a;--green-l:#e6fff4;
  --red:#f23d5e;--red-l:#fff0f3;
  --orange:#f5a623;--orange-l:#fff8ec;
  --gray-50:#f9fafb;--gray-100:#f3f4f6;--gray-200:#e5e7eb;
  --gray-300:#d1d5db;--gray-400:#9ca3af;--gray-500:#6b7280;
  --gray-600:#4b5563;--gray-700:#374151;--gray-900:#111827;
  --white:#fff;
  --safe-top:env(safe-area-inset-top);
  --safe-bot:env(safe-area-inset-bottom);
}
html{font-size:15px;-webkit-font-smoothing:antialiased;height:100%}
body{
  font-family:'Nunito',sans-serif;background:var(--gray-100);
  color:var(--gray-900);min-height:100vh;
  max-width:430px;margin:0 auto;overflow-x:hidden;
  padding-top:var(--safe-top);
}
::-webkit-scrollbar{width:0;height:0}

/* ── HEADER ───────────────────────── */
.header-card{
  background:linear-gradient(160deg,#6a0dab 0%,#820ad1 55%,#a020f0 100%);
  padding:16px 20px 72px;position:relative;overflow:hidden;
}
.header-card::before{
  content:'';position:absolute;width:240px;height:240px;border-radius:50%;
  background:rgba(255,255,255,.06);top:-70px;right:-50px;
}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;position:relative;z-index:1}
.hdr-user{display:flex;align-items:center;gap:10px}
.avatar{
  width:38px;height:38px;border-radius:50%;
  background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;
  font-size:15px;font-weight:900;color:#fff;letter-spacing:0;
}
.hdr-name{font-size:15px;font-weight:800;color:#fff}
.hdr-sub{font-size:11px;color:rgba(255,255,255,.6);margin-top:1px;font-weight:600}
.hdr-month{
  display:flex;align-items:center;gap:4px;
  background:rgba(255,255,255,.15);border-radius:20px;padding:6px 10px;
}
.hdr-month span{font-size:12px;font-weight:800;color:#fff;letter-spacing:.03em;min-width:36px;text-align:center}
.mn-btn{
  background:none;border:none;color:rgba(255,255,255,.8);font-size:18px;
  cursor:pointer;width:22px;height:22px;display:flex;align-items:center;justify-content:center;
  border-radius:50%;transition:background .15s;
}
.mn-btn:active{background:rgba(255,255,255,.2)}
.balance-section{position:relative;z-index:1}
.bal-label{font-size:11px;color:rgba(255,255,255,.6);font-weight:700;letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.bal-row{display:flex;align-items:center;gap:10px}
.bal-amount{font-size:30px;font-weight:900;color:#fff;letter-spacing:-1px;line-height:1}
.eye-btn{
  background:rgba(255,255,255,.15);border:none;border-radius:50%;
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:15px;
}
.bal-sub{font-size:12px;color:rgba(255,255,255,.55);margin-top:6px;font-weight:600}
.hdr-pills{display:flex;gap:6px;margin-top:14px;flex-wrap:wrap}
.hdr-pill{
  background:rgba(255,255,255,.13);border-radius:20px;
  padding:5px 11px;font-size:11px;font-weight:700;color:rgba(255,255,255,.85);
  display:flex;align-items:center;gap:4px;
}
.hdr-pill.g{background:rgba(0,193,106,.22);color:#7dffc0}
.hdr-pill.r{background:rgba(242,61,94,.22);color:#ffb3c0}

/* ── QUICK ACTIONS ────────────────── */
.quick-actions{
  display:flex;background:var(--white);
  border-radius:18px;box-shadow:0 6px 28px rgba(0,0,0,.13);
  margin:-40px 16px 0;position:relative;z-index:10;overflow:hidden;
}
.qa-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;
  padding:14px 6px;cursor:pointer;background:none;border:none;
  font-family:'Nunito',sans-serif;transition:background .15s;
  border-right:1px solid var(--gray-100);
}
.qa-btn:last-child{border-right:none}
.qa-btn:active{background:var(--gray-50)}
.qa-icon{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px}
.qa-icon.p{background:var(--purple-bg)}
.qa-icon.g{background:var(--green-l)}
.qa-icon.o{background:var(--orange-l)}
.qa-icon.r{background:var(--red-l)}
.qa-label{font-size:10px;font-weight:800;color:var(--gray-600);letter-spacing:.02em}

/* ── CONTENT ──────────────────────── */
.content{padding:14px 14px calc(80px + var(--safe-bot));display:flex;flex-direction:column;gap:14px}

/* ── SECTION ──────────────────────── */
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.sec-title{font-size:15px;font-weight:900;color:var(--gray-900)}
.sec-action{font-size:12px;font-weight:800;color:var(--purple);cursor:pointer;background:none;border:none;font-family:'Nunito',sans-serif}

/* ── SUMMARY ──────────────────────── */
.sum-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sum-card{background:var(--white);border-radius:14px;padding:14px 16px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.sum-lbl{font-size:10px;font-weight:800;color:var(--gray-400);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.sum-val{font-size:18px;font-weight:900;letter-spacing:-.5px}
.sum-val.g{color:var(--green)}.sum-val.r{color:var(--red)}.sum-val.p{color:var(--purple)}
.sum-sub{font-size:10px;color:var(--gray-400);margin-top:3px;font-weight:700}
.prog{height:4px;background:var(--gray-100);border-radius:2px;margin-top:8px;overflow:hidden}
.prog-f{height:100%;border-radius:2px;transition:width .5s}

/* ── CICLO CARD ───────────────────── */
.cc{background:var(--white);border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.06);overflow:hidden}
.cc-head{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray-100)}
.cc-info{display:flex;align-items:center;gap:10px}
.cc-dot{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px}
.cc-dot.p{background:var(--purple-bg)}.cc-dot.g{background:var(--green-l)}
.cc-name{font-size:14px;font-weight:900;color:var(--gray-900)}
.cc-date{font-size:11px;color:var(--gray-400);font-weight:700;margin-top:1px}
.cc-bal{text-align:right}
.cc-bal-v{font-size:15px;font-weight:900}.cc-bal-v.g{color:var(--green)}.cc-bal-v.r{color:var(--red)}
.cc-bal-l{font-size:10px;color:var(--gray-400);font-weight:700}
.cc-prog{height:3px;background:var(--gray-100)}
.cc-prog-f{height:100%;transition:width .5s}

/* ── ITEM ROW ─────────────────────── */
.ir{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 16px;border-bottom:1px solid var(--gray-50);
  cursor:pointer;transition:background .12s;gap:10px;
}
.ir:last-child{border-bottom:none}
.ir:active{background:var(--gray-50)}
.ir-l{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
.ir-ico{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px}
.ir-ico.p{background:var(--purple-bg)}.ir-ico.g{background:var(--green-l)}.ir-ico.r{background:var(--red-l)}.ir-ico.o{background:var(--orange-l)}.ir-ico.gray{background:var(--gray-100)}
.ir-txt{min-width:0}
.ir-name{font-size:13px;font-weight:800;color:var(--gray-900);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ir-meta{font-size:11px;color:var(--gray-400);font-weight:700;margin-top:2px;display:flex;align-items:center;gap:4px}
.ir-r{text-align:right;flex-shrink:0}
.ir-val{font-size:14px;font-weight:900;color:var(--gray-900)}
.ir-val.z{color:var(--gray-300)}
.tag{display:inline-block;font-size:10px;font-weight:800;padding:2px 6px;border-radius:5px;text-transform:uppercase;letter-spacing:.04em}
.tf{background:var(--purple-bg);color:var(--purple)}
.tv{background:var(--green-l);color:var(--green)}
.te{background:var(--red-l);color:var(--red)}
.tp{background:var(--orange-l);color:var(--orange)}

/* ── ADD ROW ──────────────────────── */
.add-row{
  padding:12px 16px;border-top:1px solid var(--gray-100);
  display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .12s;
}
.add-row:active{background:var(--gray-50)}
.add-ico{width:32px;height:32px;border-radius:50%;background:var(--purple-bg);color:var(--purple);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0}
.add-lbl{font-size:13px;font-weight:800;color:var(--purple)}

/* ── EMPTY ────────────────────────── */
.empty{padding:20px;text-align:center;color:var(--gray-300);font-size:13px;font-weight:700}

/* ── ANUAL ────────────────────────── */
.anual-card{background:var(--white);border-radius:16px;box-shadow:0 2px 10px rgba(0,0,0,.06);overflow:hidden}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:11.5px;min-width:680px}
thead th{
  background:var(--gray-50);padding:9px 10px;text-align:right;
  font-weight:900;font-size:10px;color:var(--gray-500);
  text-transform:uppercase;letter-spacing:.07em;
  border-bottom:2px solid var(--gray-200);white-space:nowrap;
}
thead th:first-child{text-align:left;min-width:140px;padding-left:14px}
tbody tr{border-bottom:1px solid var(--gray-100);transition:background .1s}
tbody tr:hover{background:var(--gray-50)}
tbody td{padding:8px 10px;text-align:right;font-size:11.5px;font-weight:700;color:var(--gray-500);white-space:nowrap}
tbody td:first-child{text-align:left;font-weight:800;color:var(--gray-700);padding-left:14px}
.tr-tot td{background:var(--purple-bg);color:var(--purple)!important;font-weight:900;border-top:2px solid rgba(130,10,209,.1)}
.tr-bal td{font-weight:900}
.tr-sep td{background:var(--gray-50);font-size:10px;font-weight:900;color:var(--gray-400);text-transform:uppercase;letter-spacing:.08em;padding:6px 14px}
.pv{color:var(--green)!important}.rv{color:var(--red)!important}.zv{color:var(--gray-300)!important}

/* ── BOTTOM NAV ───────────────────── */
.bnav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:var(--white);border-top:1px solid var(--gray-200);
  display:flex;z-index:200;
  padding-bottom:var(--safe-bot);
  box-shadow:0 -4px 20px rgba(0,0,0,.07);
}
.ni{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:10px 4px 6px;cursor:pointer;background:none;border:none;
  font-family:'Nunito',sans-serif;transition:all .15s;
}
.ni-ico{font-size:20px;transition:transform .2s}
.ni-lbl{font-size:10px;font-weight:800;color:var(--gray-400);transition:color .15s}
.ni.on .ni-lbl{color:var(--purple)}
.ni.on .ni-ico{transform:scale(1.15)}
.ni-dot{width:4px;height:4px;border-radius:50%;background:var(--purple);margin-top:-1px;opacity:0;transition:opacity .2s}
.ni.on .ni-dot{opacity:1}

/* ── BOTTOM SHEET ─────────────────── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:500;display:flex;align-items:flex-end;
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.overlay.open{opacity:1;pointer-events:all}
.sheet{
  background:var(--white);width:100%;max-width:430px;margin:0 auto;
  border-radius:22px 22px 0 0;max-height:94vh;overflow-y:auto;
  transform:translateY(100%);transition:transform .3s cubic-bezier(.22,1,.36,1);
  padding-bottom:var(--safe-bot);
}
.overlay.open .sheet{transform:translateY(0)}
.sh-handle{width:36px;height:4px;background:var(--gray-200);border-radius:2px;margin:12px auto 0}
.sh-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 10px}
.sh-title{font-size:18px;font-weight:900;color:var(--gray-900)}
.sh-close{background:var(--gray-100);border:none;border-radius:50%;width:32px;height:32px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gray-500)}
.sh-body{padding:0 20px 16px}

/* ── FORM ─────────────────────────── */
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:900;color:var(--gray-500);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.field input,.field select{
  width:100%;background:var(--gray-50);border:2px solid var(--gray-100);
  color:var(--gray-900);font-family:'Nunito',sans-serif;font-size:15px;
  font-weight:700;padding:12px 14px;border-radius:12px;outline:none;
  transition:border-color .15s;-webkit-appearance:none;
}
.field input:focus,.field select:focus{border-color:var(--purple);background:var(--white)}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

.tg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.to{
  padding:12px 8px;border-radius:12px;border:2px solid var(--gray-100);
  background:var(--gray-50);cursor:pointer;text-align:center;transition:all .15s;
}
.to input{display:none}
.to-ico{font-size:20px;margin-bottom:4px}
.to-lbl{font-size:11px;font-weight:800;color:var(--gray-600)}
.to.af{border-color:var(--purple);background:var(--purple-bg)}.to.af .to-lbl{color:var(--purple)}
.to.av{border-color:var(--green);background:var(--green-l)}.to.av .to-lbl{color:var(--green)}
.to.ae{border-color:var(--red);background:var(--red-l)}.to.ae .to-lbl{color:var(--red)}
.to.ap{border-color:var(--orange);background:var(--orange-l)}.to.ap .to-lbl{color:var(--orange)}

.cg{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.co{
  padding:14px 8px;border-radius:12px;border:2px solid var(--gray-100);
  background:var(--gray-50);cursor:pointer;text-align:center;transition:all .15s;
}
.co input{display:none}
.co-day{font-size:22px;font-weight:900;color:var(--gray-300);transition:color .15s}
.co-lbl{font-size:11px;font-weight:800;color:var(--gray-400)}
.co.a5{border-color:var(--purple);background:var(--purple-bg)}
.co.a5 .co-day,.co.a5 .co-lbl{color:var(--purple)}
.co.a20{border-color:var(--green);background:var(--green-l)}
.co.a20 .co-day,.co.a20 .co-lbl{color:var(--green)}

.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{
  padding:7px 12px;border-radius:20px;border:2px solid var(--gray-100);
  background:var(--gray-50);font-size:11px;font-weight:800;color:var(--gray-500);
  cursor:pointer;transition:all .15s;
}
.chip.on{border-color:var(--purple);background:var(--purple-bg);color:var(--purple)}

.parc-box{background:var(--gray-50);border-radius:12px;padding:14px;margin-top:8px}

.mg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.mv{background:var(--gray-50);border:2px solid var(--gray-100);border-radius:10px;overflow:hidden}
.mv:focus-within{border-color:var(--purple);background:var(--white)}
.mv-lbl{font-size:9px;font-weight:900;color:var(--gray-400);text-transform:uppercase;letter-spacing:.05em;padding:4px 6px 0;text-align:center}
.mv input{
  width:100%;border:none!important;background:transparent!important;
  padding:3px 4px 5px!important;font-size:12px!important;font-weight:800!important;
  text-align:center;outline:none;color:var(--gray-900);font-family:'Nunito',sans-serif;
}

.btn-p{
  width:100%;padding:16px;border-radius:14px;border:none;
  background:var(--purple);color:#fff;font-family:'Nunito',sans-serif;
  font-size:16px;font-weight:900;cursor:pointer;transition:all .15s;
  box-shadow:0 4px 16px rgba(130,10,209,.3);margin-bottom:8px;
}
.btn-p:active{background:var(--purple-l);transform:scale(.99)}
.btn-s{
  width:100%;padding:13px;border-radius:14px;border:2px solid var(--gray-200);
  background:var(--white);color:var(--gray-600);font-family:'Nunito',sans-serif;
  font-size:14px;font-weight:800;cursor:pointer;margin-bottom:8px;
}
.btn-d{
  width:100%;padding:12px;border-radius:12px;border:none;
  background:var(--red-l);color:var(--red);font-family:'Nunito',sans-serif;
  font-size:13px;font-weight:800;cursor:pointer;
}

/* ── TOAST ────────────────────────── */
.toast{
  position:fixed;bottom:calc(76px + var(--safe-bot));left:50%;

const KEY='felipe_fin_v5';
function load(){try{const d=localStorage.getItem(KEY);return d?JSON.parse(d):defData()}catch{return defData()}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(DB))}catch{}}
let DB=load();

// ═══════════════════════════════════════════════════
// STATE

let M=0,hideBal=false,mCiclo=5,applyM='mes',editId=null,editArr=null;

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function fmt(v,dash=true){
  if(dash&&v===0)return'—';
  const a=Math.abs(v),s=a.toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
  return(v<0?'-R$ ':'R$ ')+s;
}
function sR(c,m){return DB.receitas.filter(r=>r.ciclo===c).reduce((s,r)=>s+(r.vals[m]||0),0)}
function sD(c,m){return DB.despesas.filter(d=>d.ciclo===c).reduce((s,d)=>s+(d.vals[m]||0),0)}
function ant(m){const s=DB.receitas.find(r=>r.nome==='Saldo Anterior');return s?(s.vals[m]||0):0}
function tR(m){return sR(5,m)+sR(20,m)-ant(m)}
function tD(m){return sD(5,m)+sD(20,m)}
function tagH(d){
  if(d.parc)return`<span class="tag tp">${d.parc.total}x Parc.</span>`;
  const mp={fixo:['tf','Fixo'],variavel:['tv','Variável'],eventual:['te','Eventual']};
  const[c,l]=mp[d.tipo]||mp.eventual;
  return`<span class="tag ${c}">${l}</span>`;
}

const navM={'pg-home':'n-home','pg-c5':'n-c5','pg-c20':'n-c20','pg-anual':'n-anual'};
function goPg(id,navEl){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
  document.getElementById(id).classList.add('on');
  const nid=navM[id];
  if(nid)document.getElementById(nid).classList.add('on');
  else if(navEl)navEl.classList.add('on');
  render();
}
function chM(d){M=(M+d+12)%12;render()}

          <div class="sum-lbl">Despesas</div>

        <div class="sec-title">5º Dia Útil</div>
        <button class="sec-action" onclick="goPg('pg-c5',document.getElementById('n-c5'))">Ver tudo →</button>
      </div>

function cicloCard(ciclo,label,icon,dotcls,rec,desp,bal,pct,itens,m){
  const rows=itens.map(d=>`

          <div class="ir-meta">${tagH(d)}</div>
        </div>
      </div>
      <div class="ir-r"><div class="ir-val">${fmt(d.vals[m]||0)}</div></div>
    </div>`).join('');
  const pc=pct<70?'var(--green)':pct<90?'var(--orange)':'var(--red)';
  return`<div class="cc">
    <div class="cc-head">
      <div class="cc-info">
        <div class="cc-dot ${dotcls}">${icon}</div>
        <div><div class="cc-name">${label}</div><div class="cc-date">Rec: ${fmt(rec,false)}</div></div>

      <div class="cc-bal">
        <div class="cc-bal-v ${bal>=0?'g':'r'}">${fmt(bal,false)}</div>

      <div class="add-ico">+</div><div class="add-lbl">Adicionar despesa</div>
    </div>
  </div>`;
}

          <button class="mn-btn" onclick="chM(-1)">‹</button>
          <span>${MS[m].slice(0,3)}</span>
          <button class="mn-btn" onclick="chM(1)">›</button>
        </div>
      </div>
      <div style="background:rgba(255,255,255,.15);border-radius:16px;padding:16px;margin-bottom:16px">
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center">
          <div>
            <div style="font-size:10px;color:rgba(255,255,255,.6);font-weight:800;margin-bottom:3px;text-transform:uppercase">Receitas</div>
            <div style="font-size:14px;font-weight:900;color:#fff">${fmt(recL,false)}</div>
          </div>
          <div>
            <div style="font-size:10px;color:rgba(255,255,255,.6);font-weight:800;margin-bottom:3px;text-transform:uppercase">Despesas</div>
            <div style="font-size:14px;font-weight:900;color:#fff">${fmt(desp,false)}</div>
          </div>
          <div>
            <div style="font-size:10px;color:rgba(255,255,255,.6);font-weight:800;margin-bottom:3px;text-transform:uppercase">Balanço</div>
            <div style="font-size:14px;font-weight:900;color:${bal>=0?'#7dffc0':'#ffb3c0'}">${fmt(bal,false)}</div>
          </div>
        </div>
        <div style="height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin-top:14px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:${pc};border-radius:2px"></div>
        </div>
      </div>
    </div>
    <div class="content">
      <div>
        <div class="sec-head"><div class="sec-title">Receitas</div></div>
        <div class="cc">
          ${rRows||'<div class="empty">Sem receitas</div>'}
          <div class="add-row" onclick="openModal('receita',null,${ciclo})">
            <div class="add-ico">+</div><div class="add-lbl">Adicionar receita</div>
          </div>
        </div>
      </div>
      <div>
        <div class="sec-head"><div class="sec-title">Despesas</div></div>
        <div class="cc">
          ${dRows||'<div class="empty">Sem despesas</div>'}
          <div class="add-row" onclick="openModal('despesa',null,${ciclo})">
            <div class="add-ico">+</div><div class="add-lbl">Adicionar despesa</div>
          </div>
        </div>
      </div>
    </div>`;
}

function rAnual(){
  const H=`<thead><tr><th>Item</th>${MS3.map(m=>`<th>${m}</th>`).join('')}<th>TOTAL</th></tr></thead>`;
  function row(lbl,arr,cls=''){
    const tot=arr.reduce((s,v)=>s+v,0);
    const cells=arr.map(v=>`<td class="${v<0?'rv':v===0?'zv':''}">${fmt(v)}</td>`).join('');
    return`<tr class="${cls}"><td>${lbl}</td>${cells}<td class="${tot<0?'rv':tot>0?'pv':''}">${fmt(tot,false)}</td></tr>`;
  }
  const tRa=MS.map((_,i)=>tR(i)),tDa=MS.map((_,i)=>tD(i));
  const bal=MS.map((_,i)=>tRa[i]-tDa[i]);
  const r5a=MS.map((_,i)=>sR(5,i)),r20a=MS.map((_,i)=>sR(20,i));
  const d5a=MS.map((_,i)=>sD(5,i)),d20a=MS.map((_,i)=>sD(20,i));

  const dRows=DB.despesas.map(d=>{
    const tot=d.vals.reduce((s,v)=>s+v,0);if(tot===0)return'';
    const tg=d.parc?`<span class="tag tp">${d.parc.total}x</span>`:
      `<span class="tag ${{fixo:'tf',variavel:'tv',eventual:'te'}[d.tipo]||'te'}">${{fixo:'Fixo',variavel:'Var',eventual:'Ev'}[d.tipo]||'Ev'}</span>`;
    const cells=d.vals.map(v=>`<td class="${v===0?'zv':''}">${fmt(v)}</td>`).join('');
    return`<tr><td>${tg} ${d.nome}</td>${cells}<td class="pv">${fmt(tot,false)}</td></tr>`;
  }).join('');

  document.getElementById('anual-c').innerHTML=`
    <div class="sec-head">
      <div class="sec-title">Painel Anual 2025</div>
      <button class="sec-action" onclick="if(confirm('Resetar todos os dados?')){localStorage.removeItem('${KEY}');DB=defData();save();render();toast('Resetado ✓')}">↺ Reset</button>
    </div>
    <div class="anual-card"><div class="tbl-wrap"><table>${H}<tbody>
      ${row('Receitas',tRa,'tr-tot')}${row('Despesas',tDa,'tr-tot')}${row('Balanço',bal,'tr-bal')}
      <tr class="tr-sep"><td colspan="14">Ciclo 5º Dia Útil</td></tr>
      ${row('Receitas Ciclo 5',r5a)}${row('Despesas Ciclo 5',d5a)}
      <tr class="tr-sep"><td colspan="14">Ciclo Dia 20</td></tr>
      ${row('Receitas Ciclo 20',r20a)}${row('Despesas Ciclo 20',d20a)}
    </tbody></table></div></div>
    <div class="sec-head" style="margin-top:14px"><div class="sec-title">Despesas por Item</div></div>
    <div class="anual-card"><div class="tbl-wrap"><table>${H}<tbody>${dRows}</tbody></table></div></div>`;
}

// ═══════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════
function openModal(type,id=null,defCiclo=null){
  editId=id;editArr=type;mCiclo=defCiclo||5;applyM='mes';
  document.getElementById('sh-title').textContent=
    id?(type==='despesa'?'Editar Despesa':'Editar Receita'):(type==='despesa'?'Nova Despesa':'Nova Receita');
  if(id){
    const arr=type==='despesa'?DB.despesas:DB.receitas;
    const item=arr.find(x=>x.id===id);
    if(item){mCiclo=item.ciclo;buildEdit(item,type==='despesa');}
  } else {
    buildNew(type==='despesa',defCiclo||5);
  }
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.querySelector('#sh-body input')?.focus(),400);
}

function buildNew(isD,ciclo){
  document.getElementById('sh-body').innerHTML=`
    <div class="field">
      <label>Nome</label>
      <input type="text" id="fn" placeholder="${isD?'Ex: Academia, Aluguel...':'Ex: Freela, Bônus...'}">
    </div>
    <div class="field">
      <label>Tipo</label>
      <div class="tg">
        <label class="to af" id="to-f"><input type="radio" name="tp" value="fixo" checked onchange="uTipo()">
          <div class="to-ico">📌</div><div class="to-lbl">Fixo</div></label>
        <label class="to" id="to-v"><input type="radio" name="tp" value="variavel" onchange="uTipo()">
          <div class="to-ico">📈</div><div class="to-lbl">Variável</div></label>
        <label class="to" id="to-e"><input type="radio" name="tp" value="eventual" onchange="uTipo()">
          <div class="to-ico">⚡</div><div class="to-lbl">Eventual</div></label>
        ${isD?`<label class="to" id="to-p"><input type="radio" name="tp" value="parcelado" onchange="uTipo()">
          <div class="to-ico">💳</div><div class="to-lbl">Parcelado</div></label>`:''}
      </div>
    </div>
    ${isD?`<div class="field">
      <label>Ciclo de pagamento</label>
      <div class="cg">
        <div class="co ${ciclo===5?'a5':''}" id="co5" onclick="sCiclo(5)">
          <div class="co-day">5º</div><div class="co-lbl">Dia Útil</div>
        </div>
        <div class="co ${ciclo===20?'a20':''}" id="co20" onclick="sCiclo(20)">
          <div class="co-day">20</div><div class="co-lbl">Todo mês</div>
        </div>
      </div>
    </div>`:''}
    <div id="vb">
      <div class="field">
        <label>Valor (${MS[M]})</label>
        <input type="number" id="fv" step="0.01" inputmode="decimal" placeholder="0,00">
      </div>
      <div class="field">
        <label>Aplicar em</label>
        <div class="chips">
          <div class="chip on" id="ac-mes" onclick="sApply('mes')">Este mês</div>
          <div class="chip" id="ac-todos" onclick="sApply('todos')">Todos os meses</div>
          <div class="chip" id="ac-partir" onclick="sApply('partir')">Daqui em diante</div>
        </div>
      </div>
    </div>
    <div id="pb" style="display:none">
      <div class="field"><label>Parcelamento</label>
        <div class="parc-box">
          <div class="fr2">
            <div class="field" style="margin:0"><label>Nº parcelas</label>
              <input type="number" id="pn" min="2" max="120" value="12" inputmode="numeric"></div>
            <div class="field" style="margin:0"><label>Mês início</label>
              <select id="pi">${MS.map((m,i)=>`<option value="${i}" ${i===M?'selected':''}>${m.slice(0,3)}</option>`).join('')}</select>
            </div>
          </div>
          <div class="field" style="margin-top:12px;margin-bottom:0"><label>Valor da parcela</label>
            <input type="number" id="pv" step="0.01" inputmode="decimal" placeholder="0,00">
          </div>
        </div>
      </div>
    </div>
    <button class="btn-p" onclick="saveNew(${isD})">Salvar</button>
    <button class="btn-s" onclick="closeSheet()">Cancelar</button>`;
}

function uTipo(){
  const v=document.querySelector('input[name=tp]:checked')?.value;
  ['f','v','e','p'].forEach(t=>{const el=document.getElementById(`to-${t}`);if(el)el.className='to';});
  const map={fixo:['to-f','af'],variavel:['to-v','av'],eventual:['to-e','ae'],parcelado:['to-p','ap']};
  if(map[v]){const[id,cls]=map[v];document.getElementById(id)?.classList.add(cls);}
  const isParc=v==='parcelado';
  document.getElementById('pb').style.display=isParc?'block':'none';
  document.getElementById('vb').style.display=isParc?'none':'block';
}
function sCiclo(c){
  mCiclo=c;
  document.getElementById('co5').className='co'+(c===5?' a5':'');
  document.getElementById('co20').className='co'+(c===20?' a20':'');
}
function sApply(mode){
  applyM=mode;
  ['mes','todos','partir'].forEach(m=>document.getElementById(`ac-${m}`)?.classList.toggle('on',m===mode));
}

function saveNew(isD){
  const nome=document.getElementById('fn')?.value.trim();
  if(!nome){document.getElementById('fn')?.focus();return;}
  const tpEl=document.querySelector('input[name=tp]:checked');
  const tpRaw=tpEl?.value||'fixo';
  const isParc=tpRaw==='parcelado';
  const tipo=isParc?'eventual':tpRaw;
  const vals=new Array(12).fill(0);

  if(isParc&&isD){
    const n=parseInt(document.getElementById('pn')?.value)||12;
    const ini=parseInt(document.getElementById('pi')?.value)||M;
    const pval=parseFloat(document.getElementById('pv')?.value)||0;
    for(let p=0;p<n&&(ini+p)<12;p++)vals[ini+p]=pval;
    DB.despesas.push({id:uid(),ciclo:mCiclo,nome,tipo,vals,parc:{total:n,parcela:1}});
  } else {
    const val=parseFloat(document.getElementById('fv')?.value)||0;
    if(applyM==='todos')vals.fill(val);
    else if(applyM==='partir'){for(let i=M;i<12;i++)vals[i]=val;}
    else vals[M]=val;
    if(isD)DB.despesas.push({id:uid(),ciclo:mCiclo,nome,tipo,vals,parc:null});
    else DB.receitas.push({id:uid(),ciclo:mCiclo,nome,tipo,vals});
  }
  save();closeSheet();render();toast(`"${nome}" adicionado ✓`);
}

function buildEdit(item,isD){
  const tp=item.tipo;
  const mc={fixo:['to-f','af'],variavel:['to-v','av'],eventual:['to-e','ae']};
  document.getElementById('sh-body').innerHTML=`
    <div class="field">
      <label>Nome</label>
      <input type="text" id="fn" value="${item.nome}">
    </div>
    <div class="field">
      <label>Tipo</label>
      <div class="tg">
        ${['fixo','variavel','eventual'].map(t=>`
        <label class="to ${t===tp?mc[t][1]:''}" id="to-${t[0]}">
          <input type="radio" name="tp" value="${t}" ${t===tp?'checked':''} onchange="uTipoE()">
          <div class="to-ico">${t==='fixo'?'📌':t==='variavel'?'📈':'⚡'}</div>
          <div class="to-lbl">${t[0].toUpperCase()+t.slice(1)}</div>
        </label>`).join('')}
        ${isD?`<label class="to" id="to-p"><input type="radio" name="tp" value="parcelado" onchange="uTipoE()">
          <div class="to-ico">💳</div><div class="to-lbl">Parcelado</div></label>`:''}
      </div>
    </div>
    ${isD?`<div class="field">
      <label>Ciclo</label>
      <div class="cg">
        <div class="co ${item.ciclo===5?'a5':''}" id="co5" onclick="sCiclo(5)">
          <div class="co-day">5º</div><div class="co-lbl">Dia Útil</div>
        </div>
        <div class="co ${item.ciclo===20?'a20':''}" id="co20" onclick="sCiclo(20)">
          <div class="co-day">20</div><div class="co-lbl">Todo mês</div>
        </div>
      </div>
    </div>`:''}
    <div class="field">
      <label>Valores por mês</label>
      <div class="mg">
        ${MS.map((m,i)=>`
        <div class="mv">
          <div class="mv-lbl">${m.slice(0,3)}</div>
          <input type="number" step="0.01" inputmode="decimal" id="mv${i}" value="${item.vals[i]||0}">
        </div>`).join('')}
      </div>
    </div>
    <button class="btn-p" onclick="saveEdit('${item.id}','${isD?'d':'r'}')">Salvar alterações</button>
    <button class="btn-s" onclick="closeSheet()">Cancelar</button>
    <button class="btn-d" onclick="delItem('${isD?'d':'r'}','${item.id}')">Excluir este item</button>`;
}

function uTipoE(){
  const v=document.querySelector('input[name=tp]:checked')?.value;
  const mp={fixo:['to-f','af'],variavel:['to-v','av'],eventual:['to-e','ae'],parcelado:['to-p','ap']};
  ['f','v','e','p'].forEach(t=>{const el=document.getElementById(`to-${t}`);if(el)el.className='to';});
  if(mp[v]){const[id,cls]=mp[v];document.getElementById(id)?.classList.add(cls);}
}

function saveEdit(id,arr){
  const list=arr==='d'?DB.despesas:DB.receitas;
  const item=list.find(x=>x.id===id);if(!item)return;
  item.nome=document.getElementById('fn')?.value.trim()||item.nome;
  const tpEl=document.querySelector('input[name=tp]:checked');
  if(tpEl&&tpEl.value!=='parcelado')item.tipo=tpEl.value;
  if(arr==='d')item.ciclo=mCiclo;
  for(let i=0;i<12;i++){const el=document.getElementById(`mv${i}`);if(el)item.vals[i]=parseFloat(el.value)||0;}
  save();closeSheet();render();toast(`"${item.nome}" atualizado ✓`);
}

function delItem(arr,id){
  const list=arr==='d'?DB.despesas:DB.receitas;
  const item=list.find(x=>x.id===id);
  if(!item||!confirm(`Excluir "${item.nome}"?`))return;
  if(arr==='d')DB.despesas=DB.despesas.filter(x=>x.id!==id);
  else DB.receitas=DB.receitas.filter(x=>x.id!==id);
  save();closeSheet();render();toast('Item removido');
}

function closeSheet(){document.getElementById('overlay').classList.remove('open');editId=null;}
function closeOutside(e){if(e.target===document.getElementById('overlay'))closeSheet();}

// ═══════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════
let tT;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(tT);tT=setTimeout(()=>el.classList.remove('show'),2200);
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
window.addEventListener('load',()=>{
  render();
  setTimeout(()=>{
    document.getElementById('splash').classList.add('fade');
    setTimeout(()=>document.getElementById('splash').remove(),500);
  },1400);
});
</script>
</body>
</html>
